<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Photo and video gallery of Shri Mandal Mahajan Panjrapole — the herd, daily gaushala life and community gauseva.">
  <title>Gallery | Shri Mandal Mahajan Panjrapole</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <header class="page-hero">
      <div class="container fade-in">
        <h1>Gallery</h1>
        <p>Moments of seva and gaushala life — the herd, the caretakers and the community that supports them.</p>
      </div>
    </header>

    <section class="section" aria-labelledby="gallery-heading">
      <div class="container">
        <h2 id="gallery-heading" class="sr-only">Photo gallery</h2>
        <div class="gallery-filters fade-in" role="tablist" aria-label="Gallery categories">
          <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
          <button class="filter-btn" data-filter="rescue" role="tab" aria-selected="false">Rescue</button>
          <button class="filter-btn" data-filter="gaushala" role="tab" aria-selected="false">Gaushala Life</button>
          <button class="filter-btn" data-filter="events" role="tab" aria-selected="false">Events</button>
          <button class="filter-btn" data-filter="community" role="tab" aria-selected="false">Community</button>
        </div>

        <div class="gallery-grid fade-in" id="galleryGrid">
          <figure class="gallery-item" data-category="community" data-lightbox>
            <img src="images/site/gate.jpg" alt="Main entrance gate of Shri Mandal Mahajan Panjrapole" loading="lazy">
            <figcaption class="gallery-overlay"><span>Main Entrance Gate</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="gaushala" data-lightbox>
            <img src="images/site/herd-gps.jpg" alt="The herd at Mandal Mahajan Panjrapole" loading="lazy">
            <figcaption class="gallery-overlay"><span>Our Herd</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="gaushala" data-lightbox>
            <img src="images/site/courtyard.jpg" alt="Cattle in the arched sheds" loading="lazy">
            <figcaption class="gallery-overlay"><span>The Cattle Sheds</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="gaushala" data-lightbox>
            <img src="images/site/shed-wide.jpg" alt="Wide view of the gaushala sheds and grounds" loading="lazy">
            <figcaption class="gallery-overlay"><span>Gaushala Grounds</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="gaushala" data-lightbox>
            <img src="images/site/herd-close.jpg" alt="Indigenous cattle at the panjrapole" loading="lazy">
            <figcaption class="gallery-overlay"><span>Indigenous Cattle</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="community" data-lightbox>

          <figure class="gallery-item" data-category="community" data-lightbox>

          <figure class="gallery-item" data-category="gaushala" data-lightbox>
