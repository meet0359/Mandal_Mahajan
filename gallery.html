<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Photo and video gallery of Mandal Mahajan – rescues, gaushala life, events, and community programs.">
  <title>Gallery | Mandal Mahajan</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <header class="page-hero">
      <div class="container fade-in">
        <h1>Gallery</h1>
        <p>Moments of compassion, rescue, and joy from our gaushala and community programs.</p>
      </div>
    </header>

    <section class="section" aria-labelledby="gallery-heading">
      <div class="container">
        <div class="gallery-filters fade-in" role="tablist" aria-label="Gallery categories">
          <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
          <button class="filter-btn" data-filter="rescue" role="tab" aria-selected="false">Rescue</button>
          <button class="filter-btn" data-filter="gaushala" role="tab" aria-selected="false">Gaushala Life</button>
          <button class="filter-btn" data-filter="events" role="tab" aria-selected="false">Events</button>
          <button class="filter-btn" data-filter="community" role="tab" aria-selected="false">Community</button>
        </div>

        <div class="gallery-grid fade-in" id="galleryGrid">
          <figure class="gallery-item" data-category="gaushala" data-lightbox>
            <img src="https://images.unsplash.com/photo-1500595046743-cd271d694d30?w=600&q=80" alt="Cattle grazing in green pasture" loading="lazy" width="600" height="400">
            <figcaption class="gallery-overlay"><span>Morning Grazing</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="rescue" data-lightbox>
            <img src="https://images.unsplash.com/photo-1546445317-29d45606f603?w=600&q=80" alt="Rescue team with cattle" loading="lazy" width="600" height="350">
            <figcaption class="gallery-overlay"><span>Highway Rescue Operation</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="gaushala" data-lightbox>
            <img src="https://images.unsplash.com/photo-1560493676-04071c5f467b?w=600&q=80" alt="Cattle in sanctuary shelter" loading="lazy" width="600" height="450">
            <figcaption class="gallery-overlay"><span>Sanctuary Shelter</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="events" data-lightbox>
            <img src="https://images.unsplash.com/photo-1516467508483-a7212febe31a?w=600&q=80" alt="Volunteer orientation event" loading="lazy" width="600" height="300">
            <figcaption class="gallery-overlay"><span>Volunteer Orientation 2026</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="community" data-lightbox>
            <img src="https://images.unsplash.com/photo-1500595046743-cd271d694d30?w=600&q=80" alt="Community awareness workshop" loading="lazy" width="600" height="380">
            <figcaption class="gallery-overlay"><span>Village Awareness Camp</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="rescue" data-lightbox>
            <img src="https://images.unsplash.com/photo-1546445317-29d45606f603?w=600&q=80" alt="Emergency veterinary treatment" loading="lazy" width="600" height="420">
            <figcaption class="gallery-overlay"><span>Emergency Treatment</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="gaushala" data-lightbox>
            <img src="https://images.unsplash.com/photo-1560493676-04071c5f467b?w=600&q=80" alt="Calf nursery unit" loading="lazy" width="600" height="320">
            <figcaption class="gallery-overlay"><span>Calf Nursery</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="events" data-lightbox>
            <img src="https://images.unsplash.com/photo-1516467508483-a7212febe31a?w=600&q=80" alt="Annual gaushala day celebration" loading="lazy" width="600" height="400">
            <figcaption class="gallery-overlay"><span>Gaushala Day Celebration</span></figcaption>
          </figure>
          <figure class="gallery-item" data-category="community" data-lightbox>
            <img src="https://images.unsplash.com/photo-1500595046743-cd271d694d30?w=600&q=80" alt="School education program" loading="lazy" width="600" height="360">
            <figcaption class="gallery-overlay"><span>School Education Program</span></figcaption>
          </figure>
        </div>
      </div>
    </section>

    <section class="section" style="background:var(--bg-card);" aria-labelledby="videos-heading">
      <div class="container">
        <div class="section-header fade-in">
          <span class="section-label">Watch</span>
          <h2 id="videos-heading" class="section-title">Video Highlights</h2>
        </div>
        <div class="grid-3 fade-in">
          <div class="video-placeholder" role="button" tabindex="0" aria-label="Play rescue operation documentary">
            ▶
            <span style="position:absolute;bottom:1rem;left:1rem;font-size:0.9rem;">Rescue Documentary</span>
          </div>
          <div class="video-placeholder" role="button" tabindex="0" aria-label="Play gaushala tour video">
            ▶
            <span style="position:absolute;bottom:1rem;left:1rem;font-size:0.9rem;">Gaushala Virtual Tour</span>
          </div>
          <div class="video-placeholder" role="button" tabindex="0" aria-label="Play volunteer stories video">
            ▶
            <span style="position:absolute;bottom:1rem;left:1rem;font-size:0.9rem;">Volunteer Stories</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-label="Image preview" aria-hidden="true">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close preview">&times;</button>
    <img src="" alt="" id="lightboxImg">
  </div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
